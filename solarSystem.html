<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js"></script>
</head>
<body>

<script>
function setup() {
  createCanvas(800, 800);
}
 function draw() {
 	background(0);
 	push()
 	fill(255,255,0)
 	circle(400,400,100)
 	pop()

 	push()
	noFill()
	strokeWeight(1.6)
	stroke(140,140,140)
	circle(400,400,175)
	circle(400,400,250)
	circle(400,400,325)
	circle(400,400,400)
	circle(400,400,475)
	circle(400,400,550)
	circle(400,400,625)
	circle(400,400,700)
	pop()

}

</script>



</body>
</html>
