<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>

	<style>
		.item{
			border: 1px solid black;
		}

		.container{
			display: grid;
			/*grid-template-columns: 1fr 1fr 1fr;*/
			grid-template-columns: repeat(4, 1fr);
		}
		.item img{
			width: 100%;
			/*width:50%;
			height:50%;*/
			object-fit:cover ;
		}
		#item1 {
			grid-column: 3/5;
			grid-row: 1/3;
		}
		@media (max-width: 800px) {
			.container{
				grid-template-columns: repeat(1, 1fr);
			}
			#item1 {
			grid-column: unset;
			grid-row: unset;
		}
		}
	</style>
</head>
<body>
<div class="container">
	<div class="item" id="item1">
		<img src="https://i0.wp.com/scoutlife.org/wp-content/uploads/2016/12/football-1906.jpg?resize=620%2C465&ssl=1">
	</div>
	<div class="item">
		<img src="https://collections.londonmuseum.net/media/494/362/large_2016_01_15_14_14_0018.jpg">
	</div>
		
	<div class="item">
		<img src="https://capital-balls.com/sport/wp-content/uploads/2013/08/World-Oldest-Soccer-Ball-Football.jpg">
	</div>
		
	<div class="item">4</div>
	<div class="item">5</div>
</div>


</div>

</body>
</html>
