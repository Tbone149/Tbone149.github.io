	let xpos 
	let ypos
function setup() {
  createCanvas(800, 800);
  background("#AB7449");
  xpos = width/2
  ypos = height/2
}
 function draw() {
 	let randomNumber = floor(random(4))
 	if (randomNumber == 0){
 		xpos=xpos+8
 	}
 	else if (randomNumber==1){
 		xpos = xpos-8
 	}
 	else if (randomNumber==2){
 		ypos=ypos+8
 	}
 	else if (randomNumber==3){
 		ypos=ypos-8
 	}
 	
 	circle(xpos,ypos,10)
