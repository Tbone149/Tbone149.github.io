<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js"></script>
</head>
<body>

<script>
function setup() {
  createCanvas(800, 800);
}
 function draw() {
 	background("#AB7449");
 	push()
 	translate(400,400)
 	//rotate(PI/8)
 	rotate(frameCount*0.05)
 	circle(400,400,400)
 	rectMode(CENTER)
 	rect(0,0,200,12)
 	pop()
 	rect(0,0,400,100)

 	push()
 	translate(100,100)
 	rotate(frameCount*0.01)
 	rectMode(CENTER)
 	rect(0,0,200,50)
 	pop()

 	push()
 	translate(300,300)
 	rotate(frameCount*0.02)
 	circle(0-50,0-50,50)
 	circle(0+50,0-50,50)
 	circle(0,0,100)
 	pop()
}
</script>



</body>
</html>
